# 企业级 RAG 知识库系统 - 基础设施编排
# 包含 PostgreSQL、Redis、Milvus（含 etcd + MinIO 依赖）
# 数据卷挂载到项目目录下的 appdata/{服务名}

services:
  # ── PostgreSQL 数据库 ──
  postgres:
    image: postgres:latest
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: commerce_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rag_pg_2024
    ports:
      - "5432:5432"
    volumes:
      - ./appdata/postgres:/var/lib/postgresql/data

  # ── Redis 缓存 ──
  redis:
    image: redis:latest
    container_name: rag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./appdata/redis:/data
    command: redis-server --requirepass rag_redis_2024

  # ── etcd（Milvus 元数据存储依赖） ──
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: rag-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - ./appdata/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  # ── MinIO（Milvus 对象存储依赖） ──
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: rag-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: rag_minio
      MINIO_ROOT_PASSWORD: rag_minio_2024
    volumes:
      - ./appdata/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Milvus 向量数据库 ──
  milvus:
    image: milvusdb/milvus:v2.6.19
    container_name: rag-milvus
    restart: unless-stopped
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: rag_minio
      MINIO_SECRET_KEY: rag_minio_2024
    volumes:
      - ./appdata/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    command: ["milvus", "run", "standalone"]
